<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>猜拳小遊戲</title>
<style>
 /* ========================================
   基礎設定
======================================== */

:root {
  --bg-page: #f5f1e9;
  --bg-card: rgba(255, 255, 255, 0.88);
  --bg-soft: #f8f5ef;

  --sage: #8f9d8b;
  --sage-dark: #687565;
  --sage-light: #e4e9e1;

  --beige: #d8c7b3;
  --beige-light: #eee5da;

  --text-main: #4f514c;
  --text-soft: #7c7f77;
  --text-light: #9a9c96;

  --border: rgba(126, 137, 123, 0.22);

  --shadow-soft:
    0 18px 45px rgba(79, 81, 76, 0.1),
    0 4px 12px rgba(79, 81, 76, 0.06);

  --shadow-card:
    0 12px 30px rgba(79, 81, 76, 0.09),
    inset 0 1px 0 rgba(255, 255, 255, 0.9);
}

* {
  box-sizing: border-box;
}

html {
  min-height: 100%;
}

body {
  margin: 0;
  min-height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;

  padding: 40px 24px;

  font-family:
    "Noto Sans TC",
    "Microsoft JhengHei",
    sans-serif;

  color: var(--text-main);

  background:
    radial-gradient(
      circle at 15% 20%,
      rgba(216, 199, 179, 0.28),
      transparent 32%
    ),
    radial-gradient(
      circle at 85% 80%,
      rgba(143, 157, 139, 0.22),
      transparent 34%
    ),
    var(--bg-page);
}

/* ========================================
   遊戲主卡片
======================================== */

.game {
  position: relative;

  width: min(1180px, 100%);

  padding: 48px;

  overflow: hidden;

  text-align: center;

  background: var(--bg-card);

  border: 1px solid rgba(255, 255, 255, 0.85);
  border-radius: 32px;

  box-shadow: var(--shadow-soft);

  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
}

/* 淡淡的背景裝飾 */
.game::before,
.game::after {
  content: "";

  position: absolute;

  width: 220px;
  height: 220px;

  border-radius: 50%;

  pointer-events: none;
}

.game::before {
  top: -100px;
  left: -80px;

  background: rgba(216, 199, 179, 0.18);
}

.game::after {
  right: -90px;
  bottom: -110px;

  background: rgba(143, 157, 139, 0.16);
}

/* ========================================
   標題區
======================================== */

h1 {
  position: relative;
  z-index: 1;

  margin: 0 0 12px;

  font-family:
    Georgia,
    "Noto Serif TC",
    serif;

  font-size: clamp(32px, 4vw, 50px);
  font-weight: 600;
  letter-spacing: 0.04em;

  color: var(--sage-dark);
}

#rule {
  position: relative;
  z-index: 1;

  display: inline-flex;
  justify-content: center;
  align-items: center;

  margin: 0;

  padding: 9px 18px;

  font-size: 16px;
  font-weight: 600;
  letter-spacing: 0.08em;

  color: var(--sage-dark);
  background: var(--sage-light);

  border: 1px solid rgba(143, 157, 139, 0.2);
  border-radius: 999px;
}

/* ========================================
   對戰區
======================================== */

.battle-area {
  position: relative;
  z-index: 1;

  display: grid;
  grid-template-columns: minmax(240px, 1fr) minmax(260px, 0.82fr) minmax(
      240px,
      1fr
    );
  align-items: stretch;
  gap: 28px;

  margin-top: 42px;
}

/* ========================================
   玩家卡片
======================================== */

.player-box {
  width: 100%;
  min-height: 420px;

  display: flex;
  flex-direction: column;
  align-items: center;

  padding: 28px 24px 32px;

  background:
    linear-gradient(
      180deg,
      rgba(255, 255, 255, 0.94),
      rgba(248, 245, 239, 0.9)
    );

  border: 1px solid var(--border);
  border-radius: 24px;

  box-shadow: var(--shadow-card);
}

.player-box h2 {
  margin: 0 0 24px;

  padding: 8px 18px;

  font-size: 20px;
  font-weight: 700;
  letter-spacing: 0.08em;

  color: var(--sage-dark);
  background: var(--sage-light);

  border-radius: 999px;
}

/* 左右稍微做區別 */
.player-box:first-child h2 {
  color: #806b59;
  background: var(--beige-light);
}

.player-box:last-child h2 {
  color: var(--sage-dark);
  background: var(--sage-light);
}

/* ========================================
   出拳圖片區
======================================== */

.hand-area {
  width: 100%;
  flex: 1;
  min-height: 280px;

  display: flex;
  justify-content: center;
  align-items: center;

  overflow: hidden;

  font-size: 76px;

  color: var(--text-light);

  background:
    radial-gradient(
      circle,
      rgba(255, 255, 255, 0.98),
      rgba(238, 229, 218, 0.42)
    );

  border: 1px dashed rgba(143, 157, 139, 0.3);
  border-radius: 20px;
}

.player-box:last-child .hand-area {
  background:
    radial-gradient(
      circle,
      rgba(255, 255, 255, 0.98),
      rgba(228, 233, 225, 0.55)
    );
}

.hand-area img {
  display: block;

  width: min(260px, 90%);
  height: 260px;

  object-fit: contain;

  border-radius: 16px;

  animation: hand-pop 0.28s ease;
}

@keyframes hand-pop {
  from {
    opacity: 0;
    transform: scale(0.88);
  }

  to {
    opacity: 1;
    transform: scale(1);
  }
}

/* ========================================
   中央結果區
======================================== */

.center {
  width: 100%;
  min-height: 420px;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  padding: 30px 22px;

  background: rgba(248, 245, 239, 0.72);

  border: 1px solid rgba(216, 199, 179, 0.34);
  border-radius: 24px;
}

#choiceresult {
  min-height: 58px;

  margin: 0 0 12px;

  display: flex;
  justify-content: center;
  align-items: center;

  font-size: 18px;
  font-weight: 600;
  line-height: 1.7;

  color: var(--text-main);
}

#winnerresult {
  min-height: 52px;

  margin: 0 0 22px;

  display: flex;
  justify-content: center;
  align-items: center;

  font-family:
    Georgia,
    "Noto Serif TC",
    serif;

  font-size: clamp(24px, 3vw, 34px);
  font-weight: 700;
  line-height: 1.5;

  color: var(--sage-dark);
}

/* ========================================
   按鈕區
======================================== */

.buttons {
  width: 100%;

  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;

  margin-top: 4px;
}

button {
  min-height: 46px;

  padding: 10px 14px;

  border: 1px solid rgba(143, 157, 139, 0.28);
  border-radius: 14px;

  font: inherit;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 0.06em;

  color: #ffffff;
  background: var(--sage);

  cursor: pointer;

  box-shadow:
    0 7px 16px rgba(104, 117, 101, 0.17),
    inset 0 1px 0 rgba(255, 255, 255, 0.24);

  transition:
    transform 0.2s ease,
    background-color 0.2s ease,
    box-shadow 0.2s ease,
    border-color 0.2s ease;
}

button:hover {
  background: var(--sage-dark);

  border-color: var(--sage-dark);

  transform: translateY(-2px);

  box-shadow:
    0 10px 20px rgba(104, 117, 101, 0.22),
    inset 0 1px 0 rgba(255, 255, 255, 0.2);
}

button:active {
  transform: translateY(0) scale(0.97);
}

/* 重新開始按鈕獨立一行 */
button:last-child {
  grid-column: 1 / -1;

  color: #806b59;
  background: var(--beige-light);

  border-color: rgba(216, 199, 179, 0.55);

  box-shadow: none;
}

button:last-child:hover {
  color: #ffffff;
  background: #a78f77;

  border-color: #a78f77;
}

/* ========================================
   分數
======================================== */

#score {
  width: 100%;

  margin: 24px 0 0;

  padding: 12px 16px;

  font-size: 17px;
  font-weight: 700;
  letter-spacing: 0.06em;

  color: var(--sage-dark);
  background: rgba(228, 233, 225, 0.76);

  border: 1px solid rgba(143, 157, 139, 0.18);
  border-radius: 14px;
}

/* ========================================
   平板版
======================================== */

@media (max-width: 960px) {
  body {
    align-items: flex-start;

    padding: 24px 18px;
  }

  .game {
    padding: 36px 28px;
  }

  .battle-area {
    grid-template-columns: 1fr 1fr;
  }

  .center {
    grid-column: 1 / -1;
    grid-row: 2;

    min-height: auto;
  }

  .player-box {
    min-height: 360px;
  }

  .hand-area {
    min-height: 230px;
  }

  .hand-area img {
    width: min(220px, 88%);
    height: 220px;
  }
}

/* ========================================
   手機版
======================================== */

@media (max-width: 640px) {
  body {
    padding: 14px;
  }

  .game {
    padding: 28px 16px;

    border-radius: 24px;
  }

  h1 {
    font-size: 30px;
    line-height: 1.35;
  }

  #rule {
    font-size: 14px;
  }

  .battle-area {
    display: flex;
    flex-direction: column;

    gap: 18px;

    margin-top: 28px;
  }

  /* 手機版順序：
     哆啦A夢 → 玩家 → 結果與按鈕
  */
  .player-box:first-child {
    order: 1;
  }

  .player-box:last-child {
    order: 2;
  }

  .center {
    order: 3;
  }

  .player-box {
    min-height: auto;

    padding: 22px 18px;

    border-radius: 20px;
  }

  .player-box h2 {
    margin-bottom: 18px;

    font-size: 18px;
  }

  .hand-area {
    min-height: 240px;

    font-size: 64px;
  }

  .hand-area img {
    width: min(230px, 90%);
    height: 230px;
  }

  .center {
    min-height: auto;

    padding: 26px 18px;

    border-radius: 20px;
  }

  #choiceresult {
    min-height: auto;

    font-size: 16px;
  }

  #winnerresult {
    min-height: 42px;

    margin-bottom: 18px;

    font-size: 25px;
  }

  .buttons {
    grid-template-columns: 1fr;
  }

  button:last-child {
    grid-column: auto;
  }

  button {
    width: 100%;

    min-height: 48px;
  }

  #score {
    font-size: 15px;
  }
}

/* ========================================
   小尺寸手機
======================================== */

@media (max-width: 390px) {
  .game {
    padding-inline: 14px;
  }

  h1 {
    font-size: 26px;
  }

  .hand-area {
    min-height: 210px;
  }

  .hand-area img {
    width: min(200px, 90%);
    height: 200px;
  }
}

/* ========================================
   減少動態效果
======================================== */

@media (prefers-reduced-motion: reduce) {
  button,
  .hand-area img {
    animation: none;
    transition: none;
  }
}
  </style>
  </head>

  <body>
    <div class="game">
      <h1>跟哆啦A夢猜拳•͈ ₃ •͈</h1>
      <p id="rule">先贏三局的人獲勝</p>
      <div class="battle-area">
        <div class="player-box">
          <h2>哆啦A夢</h2>
          <div id="computerHand" class="hand-area">❔</div>
        </div>

        <div class="center">
          <p id="choiceresult">請選擇出拳！</p>
          <p id="winnerresult"></p>
          <div class="buttons">
            <!-- 按下以下其中一個按鈕時，呼叫 playGame這個function(函式)，並傳入參數(剪刀/石頭/布), onclick="函式名稱(傳入的參數)" -->
            <button onclick="playGame('scissors')">剪刀</button>
            <button onclick="playGame('rock')">石頭</button>
            <button onclick="playGame('paper')">布</button>
            <!-- 如果不用onclick寫 也可以用 button + document.querySelector + 定義ID
            例如:
            const scissorsBtn = document.querySelector(".btn-scissors");
            
            ScissorsBtn.addEventListener("click", function () {
            playGame("scissors"); });  -->
            <button onclick="resetGame()">重新開始</button>
          </div>

          <p id="score">玩家：0　哆啦A夢：0</p>
        </div>

        <div class="player-box">
          <h2>玩家</h2>
          <div id="playerHand" class="hand-area">❔</div>
        </div>
      </div>
    </div>

    <script>
      //////這邊是變數與資料的定義///////
      let gameOver = false;
      let playerScore = 0;
      let computerScore = 0;

      const playerImages = {
        scissors: ["./img/bscissor.png"],
        rock: ["./img/bstone.png"],
        paper: ["./img/bpaper.png"],
      };

      const computerImages = {
        scissors: ["./img/ascissor2.jpg", "./img/ascissor.png"],
        rock: ["./img/astone.jpg", "./img/astone2.png"],
        paper: ["./img/apaper.jpeg"],
      };

      const handNames = {
        scissors: "剪刀",
        rock: "石頭",
        paper: "布",
      };

      //////這邊是變數與資料的定義///////

      //////這邊是function的定義///////

      function getRandomImage(imageArray) {
        const randomIndex = Math.floor(Math.random() * imageArray.length);
        return imageArray[randomIndex];
      }

      function showImage(areaId, imageSrc) {
        document.querySelector(areaId).innerHTML = `
              <img src="${imageSrc}" alt="猜拳圖片">
            `;
      } //////這邊是function的定義///////

      // 這裡是透過click button用來呼叫playGame這個function(也在定義playGame) 裡面再呼叫了getRandomImage跟showImage兩個功能

      function playGame(playerChoice) {
        if (gameOver === true) {
          return;
        }

        const choices = ["scissors", "rock", "paper"];
        // choice的長度=3 從0~2.999..中取三個數字 再用Math floor取整數 0石頭, 1剪刀, 2布
        const randomIndex = Math.floor(Math.random() * choices.length);
        const computerChoice = choices[randomIndex];

        const playerImage = getRandomImage(playerImages[playerChoice]);
        const computerImage = getRandomImage(computerImages[computerChoice]);

        showImage("#playerHand", playerImage);
        showImage("#computerHand", computerImage);

        let resultText = "";

        if (playerChoice === computerChoice) {
          resultText = "平手！";
        } else if (
          (playerChoice === "scissors" && computerChoice === "paper") ||
          (playerChoice === "rock" && computerChoice === "scissors") ||
          (playerChoice === "paper" && computerChoice === "rock")
        ) {
          resultText = "你贏了這局！";
          playerScore++;
        } else {
          resultText = "哆啦A夢贏了這局！";
          computerScore++;
        }

        document.querySelector("#choiceresult").textContent =
          `哆啦A夢出${handNames[computerChoice]}，你出${handNames[playerChoice]}`;

        document.querySelector("#winnerresult").textContent = `${resultText}`;

        document.querySelector("#score").textContent =
          `玩家：${playerScore}　哆啦A夢：${computerScore}`;

        if (computerScore === 3) {
          document.querySelector("#winnerresult").innerHTML =
            "遊戲結束，你輸了！";
          gameOver = true;
        }

        if (playerScore === 3) {
          document.querySelector("#winnerresult").innerHTML =
            "遊戲結束，你贏了!";
          gameOver = true;
        }
      }
   

      // 重新開始按鈕按下後
   function resetGame() {
  playerScore = 0;
  computerScore = 0;

  gameOver = false; 
  // 變回false狀態就能繼續遊戲

  // 圖片回到一開始的問號
  document.querySelector("#playerHand").textContent = "❔";
  document.querySelector("#computerHand").textContent = "❔";

  
  document.querySelector("#winnerresult").textContent = "";
  document.querySelector("#choiceresult").textContent = "請選擇出拳！";

  // 分數歸零
  document.querySelector("#score").textContent =
    "玩家：0　哆啦A夢：0";
}
   
   </script>
  </body>
</html>
